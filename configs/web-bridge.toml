# Local web bridge configuration (M8).
#
# The bridge is a normal Relix peer that happens to expose an HTTP server.
# It owns NO AI provider key and does no orchestration of its own; SOL is
# still the orchestration source of truth (the bridge just renders a flow
# template per request and asks the existing flow runner to execute it).

[bridge]
# Loopback only in the alpha. NEVER bind to a non-loopback address without
# also adding an HTTP-layer auth front (out of scope until Gate 2+).
listen_addr = "127.0.0.1:9100"

[identity]
# Identity bundle the bridge presents to mesh responders. Mint with
# `relix-cli identity mint --groups chat-users` (or whatever group the
# memory + ai policies admit). The bundle is the alpha-grade AIC produced
# by `relix-cli identity mint` (SIMP-002).
bundle_path     = "dev-keys/bridge.aic"

# 32-byte secret used as the local libp2p PeerId AND as the signer for
# per-flow event log records. Gitignored.
client_key_path = "dev-keys/bridge.key"

[transport]
# Peer alias map consumed by the flow runner; same shape as
# `configs/peers-chained.toml`. Aliases must match the names used in
# `flows/chat_template.sol`: `memory` and `ai`.
peers_path    = "configs/peers-chained.toml"

# Per-call deadline.
deadline_secs = 30

# Optional override for the per-flow event log directory; defaults to
# `$RELIX_DATA_DIR/flow-runner/flows/` if unset (matching the CLI flow-run
# behavior).
# data_dir = "dev-data"

[flow]
# SOL chat template. Two placeholders: `{{SESSION}}` and `{{MESSAGE}}`.
template_path = "flows/chat_template.sol"

# ──────────────────────────── SSE knobs (M8/S2) ───────────────────────────
# Bridge-level streaming (SIMP-019): the chat flow completes in full and the
# resulting reply is sliced into SSE chunks at the HTTP boundary. NOT true
# per-token streaming — that arrives with the durable yield model at Gate 2.
[sse]
chunk_bytes    = 32   # bytes per emitted chunk (UTF-8 safe)
chunk_delay_ms = 25   # delay between chunks; 0 ⇒ immediate flush

# ─────────────────────── OpenAI-compatible shim (M8/S2) ───────────────────
# `POST /v1/chat/completions` + `GET /v1/models` translate OpenAI-format
# requests into the same SOL chat flow `/chat` uses. The bridge holds NO
# provider key — provider selection happens on the AI node (see
# `docs/provider-configuration.md`). The model ids below are advisory and
# appear in OpenAI-client model pickers (Open WebUI, etc.).
[openai_compat]
default_model = "relix"

[[openai_compat.models]]
id          = "relix"
description = "Default Relix mesh route (whichever provider is on the AI node)"

[[openai_compat.models]]
id          = "relix-mock"
description = "Mesh route — AI node currently set to mock"

[[openai_compat.models]]
id          = "relix-openrouter"
description = "Mesh route — AI node currently set to openrouter"

[[openai_compat.models]]
id          = "relix-anthropic"
description = "Mesh route — AI node currently set to anthropic"
# Optional task persistence. In local/dev this can stay absent or fail-soft.
# For production, configure the coordinator alias and set required = true so
# chat requests fail before dispatch if a durable task cannot be created.
#
# [coordinator]
# alias = "coordinator"
# required = true
