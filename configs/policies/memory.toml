# ── node.* — discovery + introspection ──────────────────────

[[rules]]
name = "node_health"
method = "node.health"
allow_groups = [
  "chat-users",
  "memory-admin",
  "web-bridge-svc",
  "ai-svc",
  "tool-svc",
  "operators",
  "controllers",
  "guest",
]

[[rules]]
name = "node_manifest"
method = "node.manifest"
allow_groups = ["chat-users", "memory-admin", "web-bridge-svc", "operators", "controllers"]

[[rules]]
name = "node_dispatch_stats"
