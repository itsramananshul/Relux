# Memory node policy. Admits the full memory + knowledge +
# skill surface plus node.* discovery. Default deny; allow only
# chat-users / operators / web-bridge-svc for read/write.

[admit]
groups = ["chat-users", "memory-admin", "web-bridge-svc", "operators", "controllers"]

# ── memory.* — turn-based + agent memory ─────────────────────

[[rules]]
name = "memory_recent_for_session"
method = "memory.recent_for_session"
allow_groups = ["chat-users", "web-bridge-svc", "operators"]

[[rules]]
name = "memory_search"
method = "memory.search"
allow_groups = ["chat-users", "web-bridge-svc", "operators"]

[[rules]]
name = "memory_search_turns"
method = "memory.search_turns"
allow_groups = ["chat-users", "web-bridge-svc", "operators"]

[[rules]]
name = "memory_session_search"
method = "memory.session_search"
allow_groups = ["chat-users", "web-bridge-svc", "operators"]

[[rules]]
name = "memory_records_search"
method = "memory.records_search"
allow_groups = ["chat-users", "web-bridge-svc", "operators"]

[[rules]]
name = "memory_write_turn"
method = "memory.write_turn"
allow_groups = ["chat-users", "web-bridge-svc", "operators"]

[[rules]]
name = "memory_agent_read"
method = "memory.agent_read"
allow_groups = ["chat-users", "web-bridge-svc", "operators"]

[[rules]]
