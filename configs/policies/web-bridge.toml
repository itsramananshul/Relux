# Web bridge node policy.
# The web bridge accepts inbound chat invocations from the local
# HTTP server (which presents the logged-in user's identity to
# the controller), then initiates outbound RPCs to memory / AI /
# tool / coordinator peers under that identity.

[admit]
groups = ["chat-users", "tool-users", "operators", "controllers", "guest", "web-bridge-svc"]

# ── HTTP-internal surfaces. The bridge registers these as
# its own coordinator capabilities so admission flows the same
# way as a peer-to-peer call.

[[rules]]
name = "chat_users_chat"
method = "chat"
allow_groups = ["chat-users", "operators"]

[[rules]]
name = "tool_users_chat_with_tool"
method = "chat_with_tool"
allow_groups = ["tool-users", "chat-users", "operators"]

# ── node.* — discovery / health ─────────────────────────────

[[rules]]
name = "node_health"
method = "node.health"
allow_groups = [
  "chat-users",
  "tool-users",
  "operators",
  "controllers",
  "memory-admin",
  "web-bridge-svc",
  "guest",
]

[[rules]]
name = "node_manifest"
method = "node.manifest"
allow_groups = ["chat-users", "tool-users", "operators", "controllers", "web-bridge-svc"]

[[rules]]
name = "node_dispatch_stats"
method = "node.dispatch.stats"
allow_groups = ["operators", "controllers"]

[[rules]]
name = "node_policy_simulate"
method = "node.policy.simulate"
allow_groups = ["operators"]

[[rules]]
name = "node_policy_recent_denials"
method = "node.policy.recent_denials"
allow_groups = ["operators"]

[[rules]]
name = "node_policy_tenant_list"
method = "node.policy.tenant_list"
allow_groups = ["operators"]

[[rules]]
name = "node_policy_tenant_get"
method = "node.policy.tenant_get"
allow_groups = ["operators"]

[[rules]]
name = "node_audit_tenant_list"
method = "node.audit.tenant_list"
allow_groups = ["operators"]

[[rules]]
name = "node_audit_tenant_recent"
method = "node.audit.tenant_recent"
allow_groups = ["operators"]

# ── SEC §14: operator-facing families the bridge PROXIES ─────
# The web bridge presents the caller's identity and proxies the
# coordinator's task.* / cron.* / agent.* / coord.* / msg.*
# surface (task list, approval inbox, agent settings, cron jobs,
# messaging). These rules were missing, so a node loaded with
# this policy denied the whole operator dashboard (6xx). Synced
# from configs/policies/default.toml; kept in coverage by the
# canonical-policy contract test.
