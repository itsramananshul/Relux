# Canonical default node policy — covers every capability the
# Relix runtime registers on a `DispatchBridge`. Copy this file
# verbatim and a single-node "everything bundled" deployment
# admits the standard set of capability calls without further
# editing.
#
# Method names are taken from the actual `bridge.register(...)`
# call sites in `crates/relix-runtime/src/`. The PolicyEngine
# does EXACT string match on `method`, so every capability
# needs its own rule — there is no glob support.
#
# Group model
# -----------
#
# - `chat-users`     — the default group `scripts/relix-mesh-up.{sh,ps1}`
#                      mints for every identity. Gets the full
#                      read + standard write surface so a
#                      copy-paste deployment of this file Just
#                      Works.
# - `operators`      — operator / admin role. Same allow as
#                      chat-users on every capability; listed
#                      separately so a deployment that retires
#                      `chat-users` for tighter isolation can
#                      flip the rules without restructuring.
# - `tool-users`     — a deployment that wants to fence tool
#                      invocations to a narrower group can flip
#                      every `tool.*` rule below from
#                      `["chat-users", "operators"]` to
#                      `["tool-users", "operators"]`.
# - `controllers`    — the libp2p PeerId-shaped service
#                      identities mesh-internal calls present
#                      (e.g. router.heartbeat push, internal
#                      service-to-service approval mirroring).
# - `web-bridge-svc` — the service identity the HTTP bridge
#                      uses when calling into peer nodes. Same
#                      practical permissions as chat-users for
#                      the read surface.
#
# Every rule explicitly enumerates which groups admit. There
# are no implicit allow paths (the engine is default-deny).

[admit]
groups = ["chat-users", "operators", "tool-users", "controllers", "web-bridge-svc"]

# ─────────────────────────────────────────────────────────────
# node.* — every node exposes these; mesh discovery + ops
# tooling depend on them.
# ─────────────────────────────────────────────────────────────

[[rules]]
name = "node_health"
method = "node.health"
allow_groups = ["chat-users", "operators", "tool-users", "controllers", "web-bridge-svc", "guest"]

# node.manifest is what the bridge calls on every peer at
# startup to learn the capability set. WITHOUT this rule
# admitting a chat-user, manifest discovery returns
# POLICY_DENIED and the bridge's CapabilityCache stays empty
# (the audit-2 CRIT).
[[rules]]
name = "node_manifest"
method = "node.manifest"
allow_groups = ["chat-users", "operators", "tool-users", "controllers", "web-bridge-svc"]

[[rules]]
name = "node_dispatch_stats"
method = "node.dispatch.stats"
allow_groups = ["operators", "controllers"]

[[rules]]
