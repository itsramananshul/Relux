[[rules]]
name = "tool_parse_document"
method = "tool.parse_document"
allow_groups = ["tool-users", "web-bridge-svc", "chat-users", "operators"]

[[rules]]
name = "tool_text_chunk"
method = "tool.text.chunk"
allow_groups = ["tool-users", "web-bridge-svc", "chat-users", "operators"]

[[rules]]
name = "tool_screen"
method = "tool.screen"
allow_groups = ["tool-users", "web-bridge-svc", "chat-users", "operators"]

[[rules]]
name = "tool_fs_stat"
