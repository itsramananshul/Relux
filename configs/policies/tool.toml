method = "tool.list_dir"
allow_groups = ["tool-users", "web-bridge-svc", "chat-users", "operators"]

[[rules]]
name = "tool_search_files"
method = "tool.search_files"
allow_groups = ["tool-users", "web-bridge-svc", "chat-users", "operators"]

[[rules]]
name = "tool_patch"
method = "tool.patch"
allow_groups = ["tool-users", "web-bridge-svc", "chat-users", "operators"]

[[rules]]
name = "tool_patch_preview"
