# Tool node policy. Admits the full tool.* surface plus node.*
# discovery. `tool-users` is the default group for routine
# tool calls; `operators` gets the destructive `terminal.*`
# shell surface and the audit reads.

[admit]
groups = ["tool-users", "web-bridge-svc", "chat-users", "operators", "controllers"]

# ── tool.read/write/list/search/patch ────────────────────────

[[rules]]
name = "tool_read_file"
method = "tool.read_file"
allow_groups = ["tool-users", "web-bridge-svc", "chat-users", "operators"]

[[rules]]
name = "tool_write_file"
method = "tool.write_file"
allow_groups = ["tool-users", "web-bridge-svc", "chat-users", "operators"]

[[rules]]
name = "tool_append_file"
method = "tool.append_file"
