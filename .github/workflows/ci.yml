name: CI

# Required gate for every push to main and every pull request.
#
# Runs the full hygiene set so no regression can land green:
#   cargo fmt --all -- --check               (formatting)
#   cargo clippy --all-targets -D warnings   (lints, per OS)
#   cargo test --workspace                   (tests, per OS)
#   cargo deny check                         (licenses, bans, sources, advisories)
#   check-boot-policy-coverage.ps1           (mesh boot-policy parity/coverage)
#
# Secret scanning is intentionally not a grep job here: this repo ships a
# secret-redaction module with real-looking key fixtures and docs, so any
# pattern broad enough to catch a leaked key also matches that legitimate
# content. An entropy-based scanner with an allowlist (gitleaks) is tracked
# separately.
#
# clippy and test run on the full ubuntu + macOS + windows matrix because
# OS-gated code (#[cfg(unix)], #[cfg(target_os = "...")], path and
# line-ending behaviour) only compiles and lints on its own host, so a
# Linux-only run lets OS-specific regressions land green. fmt and deny read
# host-independent inputs, so they run once on Linux.
#
# Heavier on-demand checks (end-to-end mesh bring-up) live in heavy-ci.yml;
# the scheduled security pass lives in nightly-security.yml. Neither is a
# required PR gate. See docs/ci-strategy.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      # Pin to the rust-toolchain.toml channel so fmt and clippy are
      # reproducible. A floating `stable` pulls newer rustfmt/clippy whose
      # output and lint set drift from the pinned toolchain and fail the gate.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt
      - run: cargo fmt --all -- --check

  build-test:
    name: clippy + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      # Pinned to match rust-toolchain.toml; see the fmt job for why.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
        # Cache is a build-speed optimisation, not a correctness gate; a
        # restore or save failure must never fail an otherwise-green run.
        continue-on-error: true
        with:
          shared-key: ci-${{ matrix.os }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  dashboard-dist:
    # The React dashboard (apps/dashboard) is the only dashboard the
    # web-bridge serves, and it serves the COMMITTED bundle at
    # crates/relix-web-bridge/dashboard-dist. This job rebuilds the dashboard
    # and fails if that committed dist drifts from source — so a stale UI can
    # never land green. Runs on the same push/PR trigger as the rest of CI;
    # no trigger/policy change.
    name: dashboard dist parity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/dashboard/package-lock.json
      - name: Install dashboard deps
        working-directory: apps/dashboard
        run: npm ci
      - name: Build dashboard
        working-directory: apps/dashboard
        run: npm run build
      - name: Check committed dist is in sync with source
        run: |
          dist=crates/relix-web-bridge/dashboard-dist
          if [ -n "$(git status --porcelain -- "$dist")" ]; then
            echo "::error::dashboard-dist is stale — run 'npm run build' in apps/dashboard and commit $dist"
            git status --porcelain -- "$dist"
            git --no-pager diff -- "$dist" | head -200
            exit 1
          fi
          echo "dashboard-dist is in sync with apps/dashboard source."

  boot-policy:
    # The local mesh boot scripts (relix-mesh-up.ps1 / relix-mesh-up.sh) each
    # generate the fail-closed mesh policy inline. A live bridge route 403s
    # unless its capability is admitted by BOTH scripts. This job parses the
    # allow rules out of both and fails on parity drift (a rule in one script
    # only) or a missing required capability, so a route can never ship without
    # its policy rule. Pure text parse; pwsh is preinstalled on ubuntu-latest.
    # Same push/PR trigger as the rest of CI; no trigger/policy change.
    name: boot-policy coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Check boot-policy coverage + parity
        shell: pwsh
        run: ./scripts/check-boot-policy-coverage.ps1

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      # Check the default-feature graph (the shipped build). The action
      # defaults `arguments` to `--all-features`, which pulls optional-feature
      # build dependencies that are not in the default build; the full
      # `--all-features` sweep stays in nightly-security.yml as the backstop.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: ""
