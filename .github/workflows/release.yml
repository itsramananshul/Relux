name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)release. vX.Y.Z = stable; vX.Y.Z-beta.N = beta pre-release.'
        required: true

permissions:
  contents: write
  # PART 3: cosign keyless signing uses OIDC token exchange with
  # Sigstore Fulcio. `id-token: write` is what lets the workflow
  # request the OIDC token; without it cosign sign-blob fails with
  # "Error: failed to get ID token: ...".
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Single job that ensures the release exists. Build jobs run in
  # parallel afterwards and upload their assets onto it. Re-running
  # this workflow with the same tag is idempotent — `gh release
  # create ... || true` no-ops if the release is already there.
  create-release:
    name: create release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: resolve
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Release channel is derived from the tag shape:
          #   vMAJOR.MINOR.PATCH            -> STABLE  (marked "Latest")
          #   anything with a -suffix       -> BETA    (GitHub pre-release;
          #     e.g. v0.4.3-beta.2, -rc.1, -alpha.1)     never marked Latest)
          # Promote a beta to stable by cutting the clean vMAJOR.MINOR.PATCH
          # tag (it rebuilds + signs and publishes to the stable channel).
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          fi
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.resolve.outputs.tag }}
          PRERELEASE: ${{ steps.resolve.outputs.prerelease }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists; assets will be added"
          elif [[ "$PRERELEASE" == "true" ]]; then
            gh release create "$TAG" \
              --prerelease \
              --title "Relix $TAG — Relay Intelligence Exchange (beta)" \
              --notes "Beta (pre-release) build of Relix $TAG — for testing, not promoted to the stable channel. See [CHANGELOG.md](https://github.com/itsramananshul/Relix/blob/main/CHANGELOG.md)."
          else
            gh release create "$TAG" \
              --latest \
              --title "Relix $TAG — Relay Intelligence Exchange" \
              --notes "Stable release of Relix $TAG. See [CHANGELOG.md](https://github.com/itsramananshul/Relix/blob/main/CHANGELOG.md) for the full feature list."
          fi

  build:
    name: build (${{ matrix.target }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # Pinned to rust-toolchain.toml so release binaries are built with the
      # same compiler version the local release gate and CI validated. A
      # floating `stable` can move underneath a ready-to-tag checkout.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          targets: ${{ matrix.target }}
      - name: Ensure rustup target is present
        # dtolnay/rust-toolchain occasionally skips the target install
        # when the host triple shares an OS with the requested target
        # (notably macos-latest is ARM but we still need the x86_64
        # Apple SDK target). Explicit rustup target add is a no-op
        # when the target is already there.
        shell: bash
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        # Caches are best-effort; never gate the release on a
        # cache restore / save flake.
        continue-on-error: true
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        shell: bash
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build (all three binaries)
        shell: bash
        # PKG_CONFIG_* are only consumed by the cross (aarch64-linux) leg:
        # openssl-sys's build script cross-compiles against the arm64 libssl
        # that Cross.toml's pre-build installs into the container, and these
        # are forwarded in via Cross.toml's `env.passthrough`. They are inert
        # for the native legs (no pkg-config cross step runs there).
        env:
          PKG_CONFIG_ALLOW_CROSS: '1'
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
        run: |
          # relix-cli ships as `relix`; the controller + bridge ship
          # under their own names. `relix boot` needs all three to be
          # next to each other on disk so the install scripts can land
          # them in the same directory.
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --release --target ${{ matrix.target }} \
              -p relix-cli -p relix-controller -p relix-web-bridge
          else
            cargo build --release --target ${{ matrix.target }} \
              -p relix-cli -p relix-controller -p relix-web-bridge
          fi

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist dist/scripts dist/flows
          cp "target/${{ matrix.target }}/release/relix-cli"        dist/relix
          cp "target/${{ matrix.target }}/release/relix-controller" dist/relix-controller
          cp "target/${{ matrix.target }}/release/relix-web-bridge" dist/relix-web-bridge
          chmod +x dist/relix dist/relix-controller dist/relix-web-bridge
          # Bundle the mesh boot scripts + flow templates that `relix boot`
          # needs. A binary-only archive left fresh installs unable to boot
          # (the installers fall back to a fragile separate raw fetch). Both
          # OS' scripts ride along so either installer finds what it needs.
          cp scripts/relix-mesh-up.sh scripts/relix-mesh-down.sh \
             scripts/relix-mesh-up.ps1 scripts/relix-mesh-down.ps1 dist/scripts/
          cp flows/chat_template.sol flows/chat.sol flows/chat_with_tool.sol \
             flows/chat_with_retry.sflow dist/flows/
          chmod +x dist/scripts/*.sh
          tar -C dist -czf "relix-${{ matrix.target }}.tar.gz" \
            relix relix-controller relix-web-bridge scripts flows

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist, dist/scripts, dist/flows | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/relix-cli.exe"        "dist/relix.exe"
          Copy-Item "target/${{ matrix.target }}/release/relix-controller.exe" "dist/relix-controller.exe"
          Copy-Item "target/${{ matrix.target }}/release/relix-web-bridge.exe" "dist/relix-web-bridge.exe"
          # Bundle the mesh boot scripts + flow templates `relix boot` needs.
          Copy-Item "scripts/relix-mesh-up.sh","scripts/relix-mesh-down.sh",`
            "scripts/relix-mesh-up.ps1","scripts/relix-mesh-down.ps1" "dist/scripts/"
          Copy-Item "flows/chat_template.sol","flows/chat.sol",`
            "flows/chat_with_tool.sol","flows/chat_with_retry.sflow" "dist/flows/"
          Compress-Archive `
            -Path "dist/relix.exe","dist/relix-controller.exe","dist/relix-web-bridge.exe","dist/scripts","dist/flows" `
            -DestinationPath "relix-${{ matrix.target }}.zip" -Force

      # PART 3: Sigstore keyless signing. cosign uses the workflow's
      # OIDC token to mint a short-lived Fulcio cert tied to the
      # workflow identity (`https://github.com/itsramananshul/Relix/
      # .github/workflows/release.yml`). The signature + cert are
      # uploaded next to each archive AND a SHA256SUMS file. The
      # install scripts re-verify both the cosign signature and the
      # hash before extracting.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            archive="relix-${{ matrix.target }}.zip"
          else
            archive="relix-${{ matrix.target }}.tar.gz"
          fi
          # sha256sum is GNU on Linux runners and present on macOS
          # via `shasum -a 256`. Use whichever is available so the
          # macOS leg doesn't drop to a stub.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "${archive}.sha256"
          else
            shasum -a 256 "$archive" > "${archive}.sha256"
          fi
          echo "Archive: $archive"
          cat "${archive}.sha256"

      - name: Sign artifacts
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            archive="relix-${{ matrix.target }}.zip"
          else
            archive="relix-${{ matrix.target }}.tar.gz"
          fi
          # Sign the deliverable archive (single canonical
          # supply-chain artifact) AND the per-archive SHA256
          # checksum file. Verifying either lets the install
          # script reach `keyless-verified` provenance.
          for artifact in "$archive" "${archive}.sha256"; do
            if [ -f "$artifact" ]; then
              cosign sign-blob --yes "$artifact" \
                --output-signature "${artifact}.sig" \
                --output-certificate "${artifact}.pem"
            fi
          done

      - name: Upload asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
        shell: bash
        run: |
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            archive="relix-${{ matrix.target }}.zip"
          else
            archive="relix-${{ matrix.target }}.tar.gz"
          fi
          # Upload the archive + its checksum + cosign signature +
          # cosign certificate. --clobber lets `workflow_dispatch`
          # re-runs replace assets in-place.
          gh release upload "$TAG" \
            "$archive" \
            "${archive}.sha256" \
            "${archive}.sig" \
            "${archive}.pem" \
            "${archive}.sha256.sig" \
            "${archive}.sha256.pem" \
            --clobber

  # PART 5: per-release SHA256SUMS for the scripts/ + flows/ tree at
  # the resolved tag. install.sh + install.ps1 fetch this file, verify
  # the cosign signature, then verify every per-asset download against
  # the contained hash. This is what lets the installers fetch script
  # + flow content from raw.githubusercontent.com pinned to the
  # release tag with the same supply-chain provenance as the binary
  # archives.
  checksums:
    name: SHA256SUMS (scripts + flows)
    needs: [create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag }}
      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          : > SHA256SUMS.txt
          for f in \
              scripts/relix-mesh-up.sh \
              scripts/relix-mesh-down.sh \
              scripts/relix-mesh-up.ps1 \
              scripts/relix-mesh-down.ps1 \
              flows/chat_template.sol \
              flows/chat.sol \
              flows/chat_with_tool.sol \
              flows/chat_with_retry.sflow ; do
            if [ -f "$f" ]; then
              sha256sum "$f" >> SHA256SUMS.txt
            fi
          done
          echo "── SHA256SUMS ──"
          cat SHA256SUMS.txt
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign SHA256SUMS
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob --yes SHA256SUMS.txt \
            --output-signature SHA256SUMS.txt.sig \
            --output-certificate SHA256SUMS.txt.pem
      - name: Upload SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
        shell: bash
        run: |
          gh release upload "$TAG" \
            SHA256SUMS.txt \
            SHA256SUMS.txt.sig \
            SHA256SUMS.txt.pem \
            --clobber
